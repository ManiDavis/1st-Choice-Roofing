<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="1st Choice Roofing">
  <!--
    Circular logo: transparent background so it works on dark (navy) surfaces.
    Gold arcs are nearly-complete circles (340° each) with the gap at the 7-8 o'clock position.
    Arc math: center (200,200), angles from 160° to 140° (SVG clockwise), large-arc=1, sweep=1.
  -->

  <!-- === Gold concentric arc rings === -->
  <!-- r=120 -->
  <path d="M 87.2,241.0 A 120,120 0 1,1 108.1,277.1"
        fill="none" stroke="#D4A017" stroke-width="1.4" opacity="0.60"/>
  <!-- r=134 -->
  <path d="M 74.1,245.8 A 134,134 0 1,1 97.4,286.1"
        fill="none" stroke="#D4A017" stroke-width="1.5" opacity="0.72"/>
  <!-- r=148 -->
  <path d="M 60.9,250.6 A 148,148 0 1,1 86.6,295.1"
        fill="none" stroke="#D4A017" stroke-width="1.6" opacity="0.84"/>
  <!-- r=162 -->
  <path d="M 47.8,255.4 A 162,162 0 1,1 75.9,304.1"
        fill="none" stroke="#D4A017" stroke-width="1.8" opacity="0.93"/>
  <!-- r=176 (outermost) -->
  <path d="M 34.6,260.2 A 176,176 0 1,1 65.2,313.1"
        fill="none" stroke="#D4A017" stroke-width="2.0" opacity="1"/>

  <!-- === House / Roof icon (gold outline) === -->
  <!-- Double-peak roofline: left-end → left-peak → valley → right-peak(taller) → right-end -->
  <polyline
    points="115,180 155,130 198,152 225,118 278,175"
    fill="none" stroke="#D4A017" stroke-width="3.5"
    stroke-linejoin="miter" stroke-linecap="round"/>
  <!-- Horizontal base line -->
  <line x1="115" y1="180" x2="278" y2="180"
        stroke="#D4A017" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Chimney (above left peak at 155,130) -->
  <polyline
    points="148,130 148,113 163,113 163,130"
    fill="none" stroke="#D4A017" stroke-width="3.5"
    stroke-linejoin="miter" stroke-linecap="round"/>
  <!-- 4 filled dots (2x2 grid), centered between the two peaks -->
  <circle cx="190" cy="154" r="5.5" fill="#D4A017"/>
  <circle cx="208" cy="154" r="5.5" fill="#D4A017"/>
  <circle cx="190" cy="167" r="5.5" fill="#D4A017"/>
  <circle cx="208" cy="167" r="5.5" fill="#D4A017"/>

  <!-- === Text === -->
  <!-- "1ST CHOICE ROOFING" — white, heavy weight -->
  <text
    x="200" y="224"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="30"
    fill="white"
    text-anchor="middle"
    letter-spacing="0.5">1ST CHOICE ROOFING</text>

  <!-- "WE ARE YOUR ONLY CHOICE" — gold, tracked out -->
  <text
    x="200" y="249"
    font-family="Arial,'Helvetica Neue',sans-serif"
    font-weight="600"
    font-size="13"
    fill="#D4A017"
    text-anchor="middle"
    letter-spacing="2.2">WE ARE YOUR ONLY CHOICE</text>
</svg>
